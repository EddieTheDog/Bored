<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlipOff. — Control Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap');

    :root {
      --bg: #0D0D0D;
      --bg2: #161616;
      --bg3: #1E1E1E;
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.15);
      --text: #F0F0F0;
      --text-dim: rgba(255,255,255,0.4);
      --text-dimmer: rgba(255,255,255,0.2);
      --accent: #00FF7F;
      --accent2: #00AAFF;
      --accent3: #FF4D00;
      --red: #FF3B30;
      --tile-bg: #222;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 300px 1fr 280px;
      grid-template-areas:
        "header header header"
        "sidebar main config";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .badge {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 3px;
      background: var(--bg3);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .badge.control { background: rgba(0,170,255,0.1); color: var(--accent2); border-color: rgba(0,170,255,0.25); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Connection status */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .conn-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    .conn-dot.waiting {
      background: #FFCC00;
      box-shadow: 0 0 6px #FFCC00;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1px solid var(--border-bright);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .header-btn:hover {
      background: var(--bg3);
      color: var(--text);
      border-color: var(--border-bright);
    }

    .header-btn.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .header-btn.primary:hover {
      background: #00e870;
    }

    /* ── Sidebar (message list) ── */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }

    .icon-btn:hover {
      background: var(--bg3);
      color: var(--text);
      border-color: var(--border-bright);
    }

    .icon-btn.accent {
      background: rgba(0,255,127,0.1);
      border-color: rgba(0,255,127,0.3);
      color: var(--accent);
    }

    .icon-btn.accent:hover {
      background: rgba(0,255,127,0.2);
    }

    /* Message list */
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    #message-list::-webkit-scrollbar { width: 3px; }
    #message-list::-webkit-scrollbar-track { background: transparent; }
    #message-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .msg-item {
      position: relative;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 3px;
      user-select: none;
    }

    .msg-item:hover {
      background: var(--bg2);
      border-color: var(--border);
    }

    .msg-item.active {
      background: rgba(0,255,127,0.06);
      border-color: rgba(0,255,127,0.2);
    }

    .msg-item.editing {
      background: rgba(0,170,255,0.06);
      border-color: rgba(0,170,255,0.25);
    }

    .msg-index {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .msg-preview {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-preview.has-content {
      color: var(--text);
    }

    .msg-item-actions {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      gap: 2px;
    }

    .msg-item:hover .msg-item-actions {
      display: flex;
    }

    .msg-action-btn {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      border: none;
      background: var(--bg3);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: all 0.1s;
    }

    .msg-action-btn:hover { background: var(--red); color: #fff; }
    .msg-action-btn.up:hover, .msg-action-btn.down:hover { background: var(--bg3); color: var(--text); }

    /* Currently showing badge */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 2px 5px;
      border-radius: 2px;
      background: rgba(0,255,127,0.1);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Main editor area ── */
    main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-header {
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .editor-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Rows editor */
    .rows-editor {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rows-editor::-webkit-scrollbar { width: 3px; }
    .rows-editor::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .row-field {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-label {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .row-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: border-color 0.15s, background 0.15s;
      outline: none;
    }

    .row-input::placeholder {
      color: var(--text-dimmer);
      text-transform: none;
      font-size: 12px;
      font-weight: 400;
    }

    .row-input:focus {
      border-color: var(--accent2);
      background: var(--bg3);
    }

    .row-char-count {
      font-size: 9px;
      color: var(--text-dimmer);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .row-char-count.over { color: var(--red); }
    .row-char-count.close { color: #FFCC00; }

    /* Preview band */
    .preview-band {
      border-top: 1px solid var(--border);
      background: #0A0A0A;
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .preview-label {
      font-size: 9px;
      color: var(--text-dimmer);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .preview-row {
      display: flex;
      gap: 2px;
    }

    .preview-tile {
      width: 22px;
      height: 22px;
      background: var(--tile-bg);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0;
      flex-shrink: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .preview-tile.filled {
      background: #2A2A2A;
    }

    .preview-tile.accent-color {
      background: var(--c, #2A2A2A);
      color: #000;
    }

    /* ── Config sidebar ── */
    .config {
      grid-area: config;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    .config::-webkit-scrollbar { width: 3px; }
    .config::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .config-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .config-section-title {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      margin-bottom: 12px;
    }

    /* Slider control */
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .control-row:last-child { margin-bottom: 0; }

    .control-label {
      font-size: 11px;
      color: var(--text-dim);
    }

    .control-value {
      font-size: 11px;
      color: var(--text);
      font-weight: 500;
      min-width: 36px;
      text-align: right;
    }

    .slider-wrap {
      width: 100%;
      margin-top: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--bg3);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      background: linear-gradient(to right, var(--accent) var(--pct, 0%), var(--bg3) var(--pct, 0%));
      height: 3px;
      border-radius: 2px;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle-row:last-child { margin-bottom: 0; }

    .toggle-label { font-size: 11px; color: var(--text-dim); }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: var(--bg3);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-dim);
      top: 2px;
      left: 2px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(0,255,127,0.15);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(14px);
      background: var(--accent);
    }

    /* Color swatches */
    .swatch-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }

    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: #fff; transform: scale(1.1); }

    /* Playback controls */
    .playback-controls {
      display: flex;
      gap: 6px;
    }

    .play-btn {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid var(--border-bright);
      background: var(--bg3);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .play-btn:hover { background: var(--bg2); color: var(--text); }

    .play-btn.active {
      background: rgba(0,255,127,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .play-btn.danger { }
    .play-btn.danger:hover { background: rgba(255,59,48,0.15); border-color: var(--red); color: var(--red); }

    /* Transport row */
    .transport {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .transport-btn {
      flex: 1;
      height: 32px;
      border-radius: 5px;
      border: 1px solid var(--border-bright);
      background: var(--bg3);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transport-btn:hover { background: var(--bg2); color: var(--text); }

    /* ── Notification ── */
    #notif {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border-bright);
      font-size: 11px;
      color: var(--text);
      font-family: var(--font-mono);
      z-index: 9999;
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
    }

    #notif.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dimmer);
      font-size: 11px;
      line-height: 1.8;
    }

    /* Drag ghost */
    .msg-item.dragging {
      opacity: 0.4;
    }

    .msg-item.drag-over {
      border-color: var(--accent2) !important;
      background: rgba(0,170,255,0.05) !important;
    }

    /* Separator */
    .sep {
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">FlipOff<span>.</span></div>
      <div class="badge control">Control Panel</div>
    </div>
    <div class="header-right">
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">WAITING FOR DISPLAY</span>
      </div>
      <a href="index.html" target="_blank" class="header-btn">↗ Open Display</a>
      <button class="header-btn primary" id="push-btn" onclick="pushToDisplay()">▶ Push to Display</button>
    </div>
  </header>

  <!-- Sidebar: message list -->
  <aside class="sidebar">
    <div class="panel-header">
      <span class="panel-title">Messages <span id="msg-count" style="color:var(--text-dimmer)">0</span></span>
      <div style="display:flex;gap:4px">
        <button class="icon-btn accent" title="Add message" onclick="addMessage()">+</button>
      </div>
    </div>
    <div id="message-list">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- Main: editor -->
  <main>
    <div class="editor-panel">
      <div class="editor-header">
        <span class="editor-title">Editor — <span id="editing-label">No message selected</span></span>
        <div class="editor-actions">
          <button class="header-btn" onclick="clearCurrentMessage()">Clear</button>
          <button class="header-btn primary" onclick="saveAndPush()">Save & Push</button>
        </div>
      </div>
      <div class="rows-editor" id="rows-editor">
        <!-- 5 row inputs -->
      </div>
      <div class="preview-band">
        <div class="preview-label">Preview — 22 columns × 5 rows</div>
        <div class="preview-grid" id="preview-grid"></div>
      </div>
    </div>
  </main>

  <!-- Config sidebar -->
  <aside class="config">

    <div class="config-section">
      <div class="config-section-title">Playback</div>
      <div class="toggle-row">
        <span class="toggle-label">Auto-rotate</span>
        <label class="toggle">
          <input type="checkbox" id="autoplay-toggle" checked onchange="onAutoplayChange()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="control-row" style="margin-top:4px">
        <span class="control-label">Interval</span>
        <span class="control-value" id="interval-val">8s</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="interval-slider" min="3000" max="30000" step="1000" value="8000" oninput="onIntervalChange()">
      </div>
      <div class="transport">
        <button class="transport-btn" onclick="sendCommand('PREV')" title="Previous">◀</button>
        <button class="transport-btn" onclick="sendCommand('NEXT')" title="Next">▶</button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">Scramble Colors</div>
      <div class="swatch-grid" id="scramble-swatches"></div>
    </div>

    <div class="config-section">
      <div class="config-section-title">Accent Colors</div>
      <div class="swatch-grid" id="accent-swatches"></div>
    </div>

    <div class="config-section">
      <div class="config-section-title">Timing</div>
      <div class="control-row">
        <span class="control-label">Scramble duration</span>
        <span class="control-value" id="scramble-val">800ms</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="scramble-slider" min="200" max="2000" step="100" value="800" oninput="onScrambleChange()">
      </div>
      <div class="control-row" style="margin-top:10px">
        <span class="control-label">Stagger delay</span>
        <span class="control-value" id="stagger-val">25ms</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="stagger-slider" min="5" max="80" step="5" value="25" oninput="onStaggerChange()">
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">Grid</div>
      <div class="control-row">
        <span class="control-label">Columns</span>
        <span class="control-value" id="cols-val">22</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="cols-slider" min="10" max="30" step="1" value="22" oninput="onColsChange()">
      </div>
      <div class="control-row" style="margin-top:10px">
        <span class="control-label">Rows</span>
        <span class="control-value" id="rows-val">5</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="rows-slider" min="2" max="8" step="1" value="5" oninput="onRowsChange()">
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">Actions</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="play-btn" onclick="exportMessages()">↓ Export JSON</button>
        <button class="play-btn" onclick="importClick()">↑ Import JSON</button>
        <button class="play-btn danger" onclick="resetToDefaults()">Reset Defaults</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importMessages(event)">
    </div>

  </aside>

</div>

<div id="notif"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────
const GRID_COLS = 22;
const GRID_ROWS = 5;

const DEFAULT_MESSAGES = [
  ['', 'GOD IS IN', 'THE DETAILS .', '- LUDWIG MIES', ''],
  ['', 'STAY HUNGRY', 'STAY FOOLISH', '- STEVE JOBS', ''],
  ['', 'GOOD DESIGN IS', 'GOOD BUSINESS', '- THOMAS WATSON', ''],
  ['', 'LESS IS MORE', '', '- MIES VAN DER ROHE', ''],
  ['', 'MAKE IT SIMPLE', 'BUT SIGNIFICANT', '- DON DRAPER', ''],
  ['', 'HAVE NO FEAR OF', 'PERFECTION', '- SALVADOR DALI', ''],
];

const DEFAULT_SCRAMBLE_COLORS = ['#00AAFF','#00FFCC','#AA00FF','#FF2D00','#FFCC00','#FFFFFF'];
const DEFAULT_ACCENT_COLORS   = ['#00FF7F','#FF4D00','#AA00FF','#00AAFF','#00FFCC'];

let state = {
  messages: JSON.parse(JSON.stringify(DEFAULT_MESSAGES)),
  editingIndex: 0,
  currentDisplayIndex: 0,
  connected: false,
  gridCols: 22,
  gridRows: 5,
  intervalMs: 8000,
  autoplay: true,
  scrambleDuration: 800,
  staggerDelay: 25,
  scrambleColors: [...DEFAULT_SCRAMBLE_COLORS],
  accentColors: [...DEFAULT_ACCENT_COLORS],
};

// ── BroadcastChannel ──────────────────────────────────────────────────
const channel = new BroadcastChannel('flipoff_control');

channel.addEventListener('message', (e) => {
  const { type, payload } = e.data;
  switch (type) {
    case 'DISPLAY_READY':
    case 'PONG':
      setConnected(true);
      if (payload) state.currentDisplayIndex = payload.index;
      renderMessageList();
      break;
    case 'STATUS':
      setConnected(true);
      if (payload) state.currentDisplayIndex = payload.index;
      renderMessageList();
      break;
  }
});

// Ping display on load
pingDisplay();
setInterval(pingDisplay, 3000);

function pingDisplay() {
  channel.postMessage({ type: 'PING' });
}

function setConnected(val) {
  state.connected = val;
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (val) {
    dot.className = 'conn-dot connected';
    label.textContent = 'DISPLAY CONNECTED';
  } else {
    dot.className = 'conn-dot';
    label.textContent = 'WAITING FOR DISPLAY';
  }
}

function sendCommand(type, payload = {}) {
  channel.postMessage({ type, payload });
}

function pushToDisplay() {
  channel.postMessage({ type: 'SET_MESSAGES', payload: { messages: state.messages } });
  channel.postMessage({ type: 'SET_INTERVAL', payload: { ms: state.intervalMs } });
  channel.postMessage({ type: 'SET_AUTOPLAY', payload: { enabled: state.autoplay } });
  notify('Pushed to display ▶');
}

function saveAndPush() {
  saveCurrentEdit();
  pushToDisplay();
}

// ── Message list ──────────────────────────────────────────────────────
function renderMessageList() {
  const list = document.getElementById('message-list');
  const count = document.getElementById('msg-count');
  count.textContent = state.messages.length;

  if (state.messages.length === 0) {
    list.innerHTML = '<div class="empty-state">No messages.<br>Click + to add one.</div>';
    return;
  }

  list.innerHTML = '';
  state.messages.forEach((msg, i) => {
    const item = document.createElement('div');
    item.className = 'msg-item' +
      (i === state.editingIndex ? ' editing' : '') +
      (i === state.currentDisplayIndex && state.connected ? ' active' : '');
    item.draggable = true;
    item.dataset.index = i;

    const preview = msg.filter(l => l.trim()).join(' · ') || '(empty)';
    const isLive = i === state.currentDisplayIndex && state.connected;

    item.innerHTML = `
      <div class="msg-index">MSG ${String(i+1).padStart(2,'0')}${isLive ? '<span class="live-badge">● LIVE</span>' : ''}</div>
      <div class="msg-preview ${preview !== '(empty)' ? 'has-content' : ''}">${preview}</div>
      <div class="msg-item-actions">
        <button class="msg-action-btn up" title="Move up" onclick="moveMsg(${i},-1,event)">↑</button>
        <button class="msg-action-btn down" title="Move down" onclick="moveMsg(${i},1,event)">↓</button>
        <button class="msg-action-btn" title="Duplicate" onclick="duplicateMsg(${i},event)">⎘</button>
        <button class="msg-action-btn" title="Send to display" onclick="sendMsg(${i},event)">▶</button>
        <button class="msg-action-btn" title="Delete" onclick="deleteMsg(${i},event)">✕</button>
      </div>
    `;

    item.addEventListener('click', () => selectMessage(i));

    // Drag
    item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', i); item.classList.add('dragging'); });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', (e) => {
      e.preventDefault();
      item.classList.remove('drag-over');
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = parseInt(item.dataset.index);
      if (fromIdx !== toIdx) reorderMessages(fromIdx, toIdx);
    });

    list.appendChild(item);
  });
}

function selectMessage(index) {
  saveCurrentEdit();
  state.editingIndex = index;
  renderMessageList();
  loadEditorForIndex(index);
}

function loadEditorForIndex(index) {
  const msg = state.messages[index] || [];
  const label = document.getElementById('editing-label');
  label.textContent = `Message ${index + 1} of ${state.messages.length}`;

  for (let r = 0; r < state.gridRows; r++) {
    const input = document.getElementById(`row-${r}`);
    if (input) input.value = (msg[r] || '').toUpperCase();
    updateRowCount(r);
  }
  updatePreview();
}

function saveCurrentEdit() {
  if (state.editingIndex < 0 || state.editingIndex >= state.messages.length) return;
  const rows = [];
  for (let r = 0; r < state.gridRows; r++) {
    const input = document.getElementById(`row-${r}`);
    rows.push(input ? input.value.toUpperCase() : '');
  }
  state.messages[state.editingIndex] = rows;
}

function addMessage() {
  saveCurrentEdit();
  const blank = Array(state.gridRows).fill('');
  state.messages.push(blank);
  state.editingIndex = state.messages.length - 1;
  renderMessageList();
  loadEditorForIndex(state.editingIndex);
  // Scroll to bottom
  const list = document.getElementById('message-list');
  list.scrollTop = list.scrollHeight;
}

function deleteMsg(index, e) {
  e.stopPropagation();
  if (state.messages.length <= 1) { notify('Must have at least 1 message'); return; }
  state.messages.splice(index, 1);
  if (state.editingIndex >= state.messages.length) state.editingIndex = state.messages.length - 1;
  renderMessageList();
  loadEditorForIndex(state.editingIndex);
}

function duplicateMsg(index, e) {
  e.stopPropagation();
  const copy = [...state.messages[index]];
  state.messages.splice(index + 1, 0, copy);
  state.editingIndex = index + 1;
  renderMessageList();
  loadEditorForIndex(state.editingIndex);
}

function sendMsg(index, e) {
  e.stopPropagation();
  sendCommand('SHOW_MESSAGE', { index });
  state.currentDisplayIndex = index;
  renderMessageList();
  notify(`Showing message ${index + 1}`);
}

function moveMsg(index, dir, e) {
  e.stopPropagation();
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= state.messages.length) return;
  [state.messages[index], state.messages[newIndex]] = [state.messages[newIndex], state.messages[index]];
  if (state.editingIndex === index) state.editingIndex = newIndex;
  renderMessageList();
  loadEditorForIndex(state.editingIndex);
}

function reorderMessages(from, to) {
  const item = state.messages.splice(from, 1)[0];
  state.messages.splice(to, 0, item);
  if (state.editingIndex === from) state.editingIndex = to;
  renderMessageList();
}

function clearCurrentMessage() {
  for (let r = 0; r < state.gridRows; r++) {
    const input = document.getElementById(`row-${r}`);
    if (input) input.value = '';
    updateRowCount(r);
  }
  updatePreview();
}

// ── Editor rows ───────────────────────────────────────────────────────
function buildEditor() {
  const container = document.getElementById('rows-editor');
  container.innerHTML = '';
  for (let r = 0; r < state.gridRows; r++) {
    const div = document.createElement('div');
    div.className = 'row-field';
    div.innerHTML = `
      <span class="row-label">R${r+1}</span>
      <input class="row-input" id="row-${r}" maxlength="${state.gridCols}" placeholder="Row ${r+1} text..." oninput="onRowInput(${r})">
      <span class="row-char-count" id="count-${r}">0/${state.gridCols}</span>
    `;
    container.appendChild(div);
  }
}

function onRowInput(r) {
  const input = document.getElementById(`row-${r}`);
  input.value = input.value.toUpperCase();
  updateRowCount(r);
  updatePreview();
}

function updateRowCount(r) {
  const input = document.getElementById(`row-${r}`);
  const count = document.getElementById(`count-${r}`);
  if (!input || !count) return;
  const len = input.value.length;
  count.textContent = `${len}/${state.gridCols}`;
  count.className = 'row-char-count' + (len > state.gridCols ? ' over' : len >= state.gridCols - 3 ? ' close' : '');
}

// ── Preview ───────────────────────────────────────────────────────────
function updatePreview() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';

  const ACCENT_COLORS = state.accentColors;

  for (let r = 0; r < state.gridRows; r++) {
    const input = document.getElementById(`row-${r}`);
    const text = ((input ? input.value : '') || '').toUpperCase();
    const padTotal = state.gridCols - text.length;
    const padLeft = Math.max(0, Math.floor(padTotal / 2));
    const padded = ' '.repeat(padLeft) + text + ' '.repeat(Math.max(0, state.gridCols - padLeft - text.length));

    const row = document.createElement('div');
    row.className = 'preview-row';

    for (let c = 0; c < state.gridCols; c++) {
      const ch = padded[c] || ' ';
      const tile = document.createElement('div');
      const isFilled = ch !== ' ';
      tile.className = 'preview-tile' + (isFilled ? ' filled' : '');
      tile.textContent = isFilled ? ch : '';
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

// ── Config controls ───────────────────────────────────────────────────
function onIntervalChange() {
  const val = parseInt(document.getElementById('interval-slider').value);
  state.intervalMs = val;
  document.getElementById('interval-val').textContent = (val / 1000).toFixed(0) + 's';
  updateSliderTrack('interval-slider');
  sendCommand('SET_INTERVAL', { ms: val });
}

function onAutoplayChange() {
  const checked = document.getElementById('autoplay-toggle').checked;
  state.autoplay = checked;
  sendCommand('SET_AUTOPLAY', { enabled: checked });
}

function onScrambleChange() {
  const val = parseInt(document.getElementById('scramble-slider').value);
  state.scrambleDuration = val;
  document.getElementById('scramble-val').textContent = val + 'ms';
  updateSliderTrack('scramble-slider');
}

function onStaggerChange() {
  const val = parseInt(document.getElementById('stagger-slider').value);
  state.staggerDelay = val;
  document.getElementById('stagger-val').textContent = val + 'ms';
  updateSliderTrack('stagger-slider');
}

function onColsChange() {
  const val = parseInt(document.getElementById('cols-slider').value);
  state.gridCols = val;
  document.getElementById('cols-val').textContent = val;
  updateSliderTrack('cols-slider');
  buildEditor();
  loadEditorForIndex(state.editingIndex);
}

function onRowsChange() {
  const val = parseInt(document.getElementById('rows-slider').value);
  state.gridRows = val;
  document.getElementById('rows-val').textContent = val;
  updateSliderTrack('rows-slider');
  buildEditor();
  loadEditorForIndex(state.editingIndex);
}

function updateSliderTrack(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
  const pct = ((val - min) / (max - min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}

// ── Color swatches ─────────────────────────────────────────────────────
function buildSwatches() {
  buildSwatchGroup('scramble-swatches', state.scrambleColors);
  buildSwatchGroup('accent-swatches', state.accentColors);
}

function buildSwatchGroup(containerId, colors) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  colors.forEach((color, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch active';
    sw.style.background = color;
    sw.title = color;
    container.appendChild(sw);
  });

  // Add custom color button
  const add = document.createElement('div');
  add.className = 'swatch';
  add.style.background = 'var(--bg3)';
  add.style.border = '1px dashed var(--border-bright)';
  add.style.fontSize = '12px';
  add.style.display = 'flex';
  add.style.alignItems = 'center';
  add.style.justifyContent = 'center';
  add.style.color = 'var(--text-dimmer)';
  add.textContent = '+';
  add.title = 'Add custom color';
  container.appendChild(add);
}

// ── Export / Import ───────────────────────────────────────────────────
function exportMessages() {
  saveCurrentEdit();
  const data = JSON.stringify({ messages: state.messages, gridCols: state.gridCols, gridRows: state.gridRows }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'flipoff-messages.json';
  a.click();
}

function importClick() {
  document.getElementById('import-file').click();
}

function importMessages(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.messages) {
        state.messages = data.messages;
        state.editingIndex = 0;
        renderMessageList();
        loadEditorForIndex(0);
        notify(`Imported ${state.messages.length} messages`);
      }
    } catch (err) {
      notify('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetToDefaults() {
  if (!confirm('Reset all messages to defaults?')) return;
  state.messages = JSON.parse(JSON.stringify(DEFAULT_MESSAGES));
  state.editingIndex = 0;
  renderMessageList();
  loadEditorForIndex(0);
  notify('Reset to defaults');
}

// ── Notify ────────────────────────────────────────────────────────────
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ─────────────────────────────────────────────────────────────
function init() {
  buildEditor();
  loadEditorForIndex(0);
  renderMessageList();
  buildSwatches();

  // Init slider tracks
  ['interval-slider','scramble-slider','stagger-slider','cols-slider','rows-slider'].forEach(updateSliderTrack);

  // Keyboard: save on editor blur
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      saveAndPush();
    }
  });
}

init();
</script>
</body>
</html>
