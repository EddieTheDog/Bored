<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Block Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    #controls {
      margin: 15px;
    }

    #grid {
      display: grid;
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    .block {
      width: 40px;
      height: 40px;
      background: #333;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎨 Connected Editor</h1>

<div id="controls">
  <input type="color" id="colorPicker" value="#ff0000">
  <button onclick="clearGrid()">Clear</button>
</div>

<div id="grid"></div>

<script>
  const grid = document.getElementById("grid");
  const colorPicker = document.getElementById("colorPicker");

  // 🔹 Get grid size (default 10)
  const size = parseInt(localStorage.getItem("gridSize")) || 10;

  // 🔹 Load saved grid data
  let gridData = JSON.parse(localStorage.getItem("gridData")) || [];

  // Set grid columns dynamically
  grid.style.gridTemplateColumns = `repeat(${size}, 40px)`;

  function saveGrid() {
    localStorage.setItem("gridData", JSON.stringify(gridData));
  }

  function createGrid() {
    grid.innerHTML = "";

    for (let i = 0; i < size * size; i++) {
      const block = document.createElement("div");
      block.className = "block";

      // load saved color
      if (gridData[i]) {
        block.style.background = gridData[i];
      }

      block.addEventListener("click", () => {
        const color = colorPicker.value;
        block.style.background = color;
        gridData[i] = color;
        saveGrid();
      });

      grid.appendChild(block);
    }
  }

  function clearGrid() {
    gridData = [];
    saveGrid();
    createGrid();
  }

  createGrid();
</script>

</body>
</html>
