<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Block Editor</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #grid {
      display: grid;
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    .block {
      width: 40px;
      height: 40px;
      background: #333;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎨 Editor (Working)</h1>

<input type="color" id="colorPicker" value="#ff0000">
<button onclick="clearGrid()">Clear</button>

<div id="grid"></div>

<script>
  const grid = document.getElementById("grid");
  const picker = document.getElementById("colorPicker");

  // SAFE load
  let size = 10;
  let gridData = [];

  try {
    size = parseInt(localStorage.getItem("gridSize")) || 10;
    gridData = JSON.parse(localStorage.getItem("gridData")) || [];
  } catch (e) {
    console.warn("Storage error, resetting...");
    localStorage.removeItem("gridData");
    gridData = [];
  }

  grid.style.gridTemplateColumns = `repeat(${size}, 40px)`;

  function save() {
    localStorage.setItem("gridData", JSON.stringify(gridData));
  }

  function createGrid() {
    grid.innerHTML = "";

    for (let i = 0; i < size * size; i++) {
      const div = document.createElement("div");
      div.className = "block";

      // load saved color
      if (gridData[i]) {
        div.style.background = gridData[i];
      }

      div.onclick = () => {
        const color = picker.value;
        div.style.background = color;
        gridData[i] = color;
        save();

        console.log("Clicked block", i, "color:", color); // DEBUG
      };

      grid.appendChild(div);
    }
  }

  function clearGrid() {
    gridData = [];
    save();
    createGrid();
  }

  createGrid();
</script>

</body>
</html>
