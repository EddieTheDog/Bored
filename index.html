<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff. — Display</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <style>
    html, body { width:100%; height:100%; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #board-container { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
    .board { --tile-size:clamp(40px,4.2vw,72px); border-radius:0; box-shadow:none; width:100%; }
    #status-bar { position:fixed; bottom:20px; left:24px; display:flex; align-items:center; gap:12px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; font-weight:600; color:rgba(255,255,255,0.3); letter-spacing:0.08em; text-transform:uppercase; user-select:none; z-index:100; }
    #status-bar .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.4s; }
    #status-bar .dot.live { background:#00FF7F; box-shadow:0 0 6px #00FF7F; }
    #status-bar .dot.ctrl { background:#00AAFF; box-shadow:0 0 6px #00AAFF; }
    #controls-hint { position:fixed; bottom:20px; right:24px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; font-weight:500; color:rgba(255,255,255,0.2); letter-spacing:0.05em; user-select:none; }
    #toast { position:fixed; bottom:56px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:8px 20px; border-radius:20px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; font-weight:600; letter-spacing:0.05em; z-index:9999; transition:opacity 0.3s; pointer-events:none; opacity:0; }
    #start-overlay { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; cursor:pointer; z-index:200; transition:opacity 0.5s; }
    #start-overlay .logo { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:56px; font-weight:900; letter-spacing:-2px; color:#fff; }
    #start-overlay .prompt { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; color:rgba(255,255,255,0.4); letter-spacing:0.12em; text-transform:uppercase; }
    #start-overlay.hidden { opacity:0; pointer-events:none; }
  </style>
</head>
<body>
  <div id="start-overlay">
    <div class="logo">FlipOff.</div>
    <div class="prompt">Click anywhere to start</div>
  </div>
  <div id="board-container"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
